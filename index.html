/* ── 유틸 ─────────────────────────────────────────────────────── */
function uid(n) {
  n = n || 8;
  var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789', r='';
  for (var i=0;i<n;i++) r+=c[Math.floor(Math.random()*c.length)];
  return r;
}
function fmtDT(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  var date = d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';
  var h=d.getHours(), mi=d.getMinutes();
  if (h===0&&mi===0) return date;
  var ap=h<12?'오전':'오후', hh=h%12||12, mm=mi>0?':'+String(mi).padStart(2,'0'):'';
  return date+' '+ap+' '+hh+mm+'시';
}
function fmtAgo(ts) {
  var m=Math.floor((Date.now()-ts)/60000);
  if (m<1) return '방금'; if (m<60) return m+'분 전';
  var h=Math.floor(m/60); if (h<24) return h+'시간 전';
  return Math.floor(h/24)+'일 전';
}
function isExpired(iso) { return iso ? Date.now()>new Date(iso).getTime() : false; }
function defaultDL() {
  var d=new Date(); d.setDate(d.getDate()+7); d.setHours(12,0,0,0);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'T12:00';
}

/* ── 카운트다운 ────────────────────────────────────────────────── */
function useCountdown(iso) {
  var init = iso ? new Date(iso).getTime()-Date.now() : -1;
  var st = useState(init);
  var diff=st[0], setDiff=st[1];
  useEffect(function() {
    if (!iso) return;
    var id=setInterval(function(){ setDiff(new Date(iso).getTime()-Date.now()); },1000);
    return function(){ clearInterval(id); };
  }, [iso]);
  if (diff<=0) return null;
  var s=Math.floor(diff/1000), d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60), ss=s%60;
  if (d>0) return d+'일 '+h+'시간 '+m+'분';
  if (h>0) return h+'시간 '+m+'분 '+ss+'초';
  return m+'분 '+ss+'초';
}

/* ── 인메모리 DB ───────────────────────────────────────────────── */
var DB = { groups:{}, orders:{}, myGrps:{}, myOrds:{} };

function dbSaveGroup(g)  { DB.groups[g.id]=g; trySaveWS('g:'+g.id, g); }
function dbGetGroup(gid) { return DB.groups[gid]||null; }
function dbDelGroup(gid) { delete DB.groups[gid]; delete DB.orders[gid]; tryDelWS('g:'+gid); }

function dbSaveOrder(gid,o) { if (!DB.orders[gid]) DB.orders[gid]={}; DB.orders[gid][o.id]=o; trySaveWS('o:'+gid+':'+o.id, o); }
function dbGetOrders(gid)   { return Object.values(DB.orders[gid]||{}).sort(function(a,b){return (b.submittedAt||0)-(a.submittedAt||0);}); }
function dbDelOrder(gid,oid){ if (DB.orders[gid]) delete DB.orders[gid][oid]; tryDelWS('o:'+gid+':'+oid); }
function dbDelGroupOrders(gid){ delete DB.orders[gid]; }

function dbSaveMyGrp(info) { DB.myGrps[info.gid]=info; }
function dbDelMyGrp(gid)   { delete DB.myGrps[gid]; }
function dbGetMyGrps()     { return Object.values(DB.myGrps).sort(function(a,b){return b.createdAt-a.createdAt;}); }
function dbMarkOrd(gid,oid)  { if (!DB.myOrds[gid]) DB.myOrds[gid]={}; DB.myOrds[gid][oid]=true; }
function dbUnmarkOrd(gid,oid){ if (DB.myOrds[gid]) delete DB.myOrds[gid][oid]; }
function dbMyOrdIds(gid)     { return DB.myOrds[gid]||{}; }

/* window.storage 백업 (실패해도 조용히 무시) */
function trySaveWS(key, val) {
  try { if (window.storage) window.storage.set('bop:'+key, JSON.stringify(val), true); } catch(e){}
}
function tryDelWS(key) {
  try { if (window.storage) window.storage.delete('bop:'+key, true); } catch(e){}
}
function tryGetWS(key, cb) {
  try {
    if (!window.storage) { cb(null); return; }
    window.storage.get('bop:'+key, true).then(function(r) {
      try { cb(r ? JSON.parse(r.value) : null); } catch(e){ cb(null); }
    }).catch(function(){ cb(null); });
  } catch(e){ cb(null); }
}

/* 그룹 로드: 메모리 먼저, 없으면 WS */
function loadGroup(gid, cb) {
  var g = dbGetGroup(gid);
  if (g) { cb(g); return; }
  tryGetWS('g:'+gid, function(val) {
    if (val) { DB.groups[val.id]=val; }
    cb(val);
  });
}

/* 주문 로드: 메모리 먼저, 없으면 WS list */
function loadOrders(gid, cb) {
  var fromMem = dbGetOrders(gid);
  if (fromMem.length > 0) { cb(fromMem); return; }
  try {
    if (!window.storage) { cb(fromMem); return; }
    window.storage.list('bop:o:'+gid+':', true).then(function(r) {
      var keys = (r && r.keys) ? r.keys : [];
      if (!keys.length) { cb(fromMem); return; }
      var results = [], done = 0;
      keys.forEach(function(k) {
        var shortKey = k.replace('bop:','');
        tryGetWS(shortKey, function(val) {
          if (val) results.push(val);
          done++;
          if (done===keys.length) {
            results.forEach(function(o){ if (!DB.orders[gid]) DB.orders[gid]={}; DB.orders[gid][o.id]=o; });
            cb(results.sort(function(a,b){return (b.submittedAt||0)-(a.submittedAt||0);}));
          }
        });
      });
    }).catch(function(){ cb(fromMem); });
  } catch(e){ cb(fromMem); }
}

/* ── 라우팅 ────────────────────────────────────────────────────── */
function readInitialRoute() {
  try {
    var hash=(window.location.hash||'').replace('#','');
    if (!hash) return {view:'home',gid:null,token:null};
    var p={};
    hash.split('&').forEach(function(kv){ var i=kv.indexOf('='); if(i>0) p[kv.slice(0,i)]=decodeURIComponent(kv.slice(i+1)); });
    if (p.g) return {view:p.k?'admin':'guest', gid:p.g, token:p.k||null};
  } catch(e){}
  return {view:'home',gid:null,token:null};
}

/* ── 주문 계산 ─────────────────────────────────────────────────── */
function calcOrder(order) {
  var beer=0,ship=0,qty=0,dqty=0;
  var items = order.items||[];
  for (var i=0;i<items.length;i++) {
    var it=items[i], p=getProd(it.productCode), q=Number(it.qty)||0;
    if (!p||q<=0) continue;
    beer+=p.price*q; qty+=q;
    if (it.location==='택배'){ ship+=q*SHIP_FEE; dqty+=q; }
  }
  return {beer:beer,ship:ship,qty:qty,dqty:dqty,grand:beer+ship};
}
function calcAll(orders) {
  var a={beer:0,ship:0,qty:0,dqty:0,grand:0};
  for (var i=0;i<orders.length;i++){ var t=calcOrder(orders[i]); a.beer+=t.beer;a.ship+=t.ship;a.qty+=t.qty;a.dqty+=t.dqty;a.grand+=t.grand; }
  return a;
}

function mkItem(){ return {id:uid(5),location:'택배',productCode:'',qty:1,note:''}; }

function OrderForm(props) {
  var allowOffice=props.allowOffice, initial=props.initial, onSubmit=props.onSubmit, onCancel=props.onCancel;
  var s1=useState(initial?initial.ordererName||'':''); var name=s1[0]; var setName=s1[1];
  var s2=useState(initial?initial.ordererPhone||'':''); var phone=s2[0]; var setPhone=s2[1];
  var s3=useState(function(){
    if (initial&&initial.items&&initial.items.length) return initial.items.map(function(it){return Object.assign({id:uid(5),note:''},it);});
    return [mkItem()];
  }); var items=s3[0]; var setItems=s3[1];
  var initRec=initial&&initial.recipient?initial.recipient:{name:'',phone:'',zip:'',addr:''};
  var initSame=!initial||!initial.recipient||!initial.recipient.name||initial.recipient.name===(initial.ordererName||'');
  var s4=useState(initSame); var same=s4[0]; var setSame=s4[1];
  var s5=useState(initRec); var recip=s5[0]; var setRecip=s5[1];
  var s6=useState(''); var err=s6[0]; var setErr=s6[1];

  var enriched=useMemo(function(){
    return items.map(function(it){
      var p=getProd(it.productCode),q=Number(it.qty)||0;
      return Object.assign({},it,{p:p,beer:p?p.price*q:0,ship:(it.location==='택배'&&p)?q*SHIP_FEE:0});
    });
  },[items]);

  /* 택배 선택된 품목이 있을 때만 배송지 섹션 표시 */
  var hasShip=false;
  for (var hi=0;hi<items.length;hi++){
    if (items[hi].location==='택배'&&items[hi].productCode){ hasShip=true; break; }
  }

  var totals=useMemo(function(){
    var b=0,s=0;
    for (var i=0;i<enriched.length;i++){if(enriched[i].p){b+=enriched[i].beer;s+=enriched[i].ship;}}
    return {beer:b,ship:s};
  },[enriched]);

  function upd(id,patch){ setItems(function(a){return a.map(function(it){return it.id===id?Object.assign({},it,patch):it;});}); }
  function remIt(id){ setItems(function(a){return a.length===1?[mkItem()]:a.filter(function(it){return it.id!==id;});}); }

  function submit(){
    setErr('');
    if (!name.trim()){setErr('이름을 입력해주세요.');return;}
    var valid=items.filter(function(it){return it.productCode&&it.location;});
    if (!valid.length){setErr('품목을 1개 이상 선택해주세요.');return;}
    var rec=null;
    if (hasShip){
      rec=same?{name:name.trim(),phone:phone.trim(),zip:recip.zip,addr:recip.addr}:Object.assign({},recip);
      if (!rec.name.trim()){setErr('받는 사람 성함을 입력해주세요.');return;}
      if (!rec.phone.trim()){setErr('받는 사람 연락처를 입력해주세요.');return;}
      if (!/^\d{5}$/.test(rec.zip||'')){setErr('우편번호 5자리를 입력해주세요.');return;}
      if (!rec.addr.trim()){setErr('배송 주소를 입력해주세요.');return;}
    }
    var id=initial?initial.id:undefined, isHost=initial?initial.isHost:undefined;
    onSubmit({id:id,isHost:isHost,ordererName:name.trim(),ordererPhone:phone.trim(),
      items:valid.map(function(it){return {id:it.id,location:it.location,productCode:it.productCode,qty:Number(it.qty)||1,note:it.note||''};}),
      recipient:rec});
  }

  return (
    <div>
      <Card title="주문자 정보" no="01">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <Field label="이름" required><Inp value={name} onChange={function(v){setName(v);setErr('');}} /></Field>
          <Field label="연락처" hint="호스트가 연락할 때"><Inp value={phone} onChange={setPhone} type="tel" /></Field>
        </div>
      </Card>

      <Card title="주문 품목" no="02">
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {enriched.map(function(it,idx){
            return (
              <div key={it.id} style={{borderRadius:8,border:'1px solid '+(it.p?C.copperL:C.soft),backgroundColor:C.inputBg,padding:13}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                  <span style={{fontSize:12,fontWeight:600,color:C.muted}}>
                    {'품목 '+(idx+1)}{it.p&&<span style={{color:C.green}}>{' · '+fmt(it.beer+it.ship)+'원'}</span>}
                  </span>
                  {items.length>1&&<IBtn onClick={function(){remIt(it.id);}} danger={true}>x</IBtn>}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'4fr 2fr 2fr',gap:10}}>
                  <Field label="품목" required>
                    <Sel value={it.productCode} onChange={function(v){upd(it.id,{productCode:v});setErr('');}} ph="선택"
                      options={PRODUCTS.map(function(p){return {value:p.code,label:p.name+' '+p.pack+' · '+fmt(p.price)+'원'};})} />
                  </Field>
                  <Field label="수령지" required>
                    {allowOffice
                      ? <Sel value={it.location} onChange={function(v){upd(it.id,{location:v});}} ph="선택" options={LOCS} />
                      : <div style={{borderRadius:8,border:'1px solid '+C.copperL,backgroundColor:C.copperBg,padding:'10px 12px',fontSize:13,fontWeight:700,color:C.green}}>택배</div>}
                  </Field>
                  <Field label="수량" required>
                    <Stepper value={Number(it.qty)||1} onChange={function(v){upd(it.id,{qty:v});}} />
                  </Field>
                </div>
                {it.p&&<div style={{marginTop:9,fontSize:12,borderRadius:6,backgroundColor:C.surface,border:'1px solid '+C.soft,padding:'7px 11px',color:C.muted}}>
                  맥주값 <strong style={{color:C.ink}}>{fmt(it.beer)}원</strong> · 택배비 <strong style={{color:C.ink}}>{fmt(it.ship)}원</strong>
                </div>}
              </div>
            );
          })}
        </div>
        <DashBtn onClick={function(){setItems(function(a){return a.concat([mkItem()]);});}}>+ 품목 추가</DashBtn>
      </Card>

      {/* 배송 정보: 택배 품목이 1개라도 있을 때만 표시 */}
      {hasShip&&(
        <Card title="배송 정보 (택배)" no="03">
          <label style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,cursor:'pointer',fontSize:13}}>
            <input type="checkbox" checked={same} onChange={function(e){setSame(e.target.checked);setErr('');}}
              style={{accentColor:C.green,width:15,height:15}} />
            받는 사람이 주문자 본인과 같아요
          </label>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13}}>
            {!same&&(
              <React.Fragment>
                <Field label="받는 사람 성함" required>
                  <Inp value={recip.name} onChange={function(v){setRecip(Object.assign({},recip,{name:v}));setErr('');}} />
                </Field>
                <Field label="받는 사람 연락처" required>
                  <Inp value={recip.phone} onChange={function(v){setRecip(Object.assign({},recip,{phone:v}));setErr('');}} type="tel" />
                </Field>
              </React.Fragment>
            )}
            <Field label="우편번호" required>
              <Inp value={recip.zip} onChange={function(v){setRecip(Object.assign({},recip,{zip:v.replace(/\D/g,'').slice(0,5)}));setErr('');}} inputMode="numeric" maxLength={5} />
            </Field>
            <div style={{gridColumn:same?'1':'1 / span 2'}}>
              <Field label="주소" required>
                <Inp value={recip.addr} onChange={function(v){setRecip(Object.assign({},recip,{addr:v}));setErr('');}} />
              </Field>
            </div>
          </div>
        </Card>
      )}

      <div style={{borderRadius:12,backgroundColor:C.green,color:C.surface,padding:18,marginBottom:14}}>
        <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between'}}>
          <span style={{fontSize:13,fontWeight:600,color:C.copperL}}>합계</span>
          <span style={{fontSize:24,fontWeight:800}}>{fmt(totals.beer+totals.ship)}<span style={{fontSize:14,marginLeft:3,color:C.copperL}}>원</span></span>
        </div>
        <div style={{fontSize:12,marginTop:3,color:C.copperL,opacity:.8}}>맥주 {fmt(totals.beer)}원 · 택배 {fmt(totals.ship)}원</div>
      </div>
      {err&&<ErrBox>{err}</ErrBox>}
      <GBtn onClick={submit}>{initial?'수정 완료':'주문 등록'}</GBtn>
      <button onClick={onCancel} style={{display:'block',width:'100%',marginTop:8,padding:'10px 0',fontSize:13,color:C.muted,background:'none',border:'none',cursor:'pointer'}}>취소</button>
    </div>
  );
}

function BeerQuiz(props) {
  var nav=props.nav;
  var s1=useState(-1); var step=s1[0]; var setStep=s1[1];
  var s2=useState([]); var answers=s2[0]; var setAnswers=s2[1];
  var s3=useState(null); var result=s3[0]; var setResult=s3[1];
  var s4=useState(''); var aiComment=s4[0]; var setAiComment=s4[1];
  var s5=useState(false); var loadingAI=s5[0]; var setLoadingAI=s5[1];
  var s6=useState(false); var animating=s6[0]; var setAnimating=s6[1];

  function startQuiz() { setStep(0); setAnswers([]); setResult(null); setAiComment(''); }

  function pickAnswer(optIdx) {
    if (animating) return;
    var newAnswers = answers.concat([optIdx]);
    setAnimating(true);
    setTimeout(function() {
      setAnimating(false);
      if (newAnswers.length >= QUIZ_QS.length) {
        finishQuiz(newAnswers);
      } else {
        setAnswers(newAnswers);
        setStep(newAnswers.length);
      }
    }, 300);
  }

  function finishQuiz(ans) {
    var scores = {P1:0,P2:0,P3:0,P4:0,P5:0};
    var codes = ['P1','P2','P3','P4','P5'];
    for (var qi=0;qi<QUIZ_QS.length;qi++) {
      var opt = QUIZ_QS[qi].opts[ans[qi]];
      for (var ci=0;ci<codes.length;ci++) {
        scores[codes[ci]] += opt.scores[ci];
      }
    }
    var best='P1', bestScore=0;
    for (var k in scores) { if (scores[k] > bestScore) { bestScore=scores[k]; best=k; } }
    setResult(best);
    setStep(99);
    fetchAIComment(best, ans);
  }

  function fetchAIComment(beerCode, ans) {
    setLoadingAI(true);
    var beer = PRODUCTS.filter(function(p){return p.code===beerCode;})[0];
    var beerType = BEER_TYPES[beerCode];
    var answerTexts = ans.map(function(ai,qi){ return QUIZ_QS[qi].opts[ai].label; });
    var prompt = '사내 맥주 판매 심리테스트 결과를 재미있게 설명해줘.\n' +
      '결과 맥주: ' + beer.name + ' (' + beerType.title + ')\n' +
      '응답자 답변:\n' + answerTexts.map(function(a,i){return (i+1)+'. '+a;}).join('\n') + '\n\n' +
      '2-3문장으로, 이 사람의 성격과 ' + beer.name + '이 왜 잘 어울리는지 유머있고 공감되게 한국어로 써줘. ' +
      '"당신은" 으로 시작하고, 이모지 1-2개 포함. 과장이나 칭찬 위주로.';
    fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:200,
        messages:[{role:'user',content:prompt}]
      })
    }).then(function(r){return r.json();})
    .then(function(d){
      var text = (d.content && d.content[0] && d.content[0].text) || '';
      setAiComment(text);
      setLoadingAI(false);
    }).catch(function(){ setLoadingAI(false); });
  }

  /* ── 인트로 ── */
  if (step === -1) {
    return (
      <div className="afd">
        <BackBtn onClick={function(){nav('home');}} label="홈으로" />
        <div style={{textAlign:'center',padding:'32px 0 24px'}}>
          <div style={{fontSize:56,marginBottom:16}}>🍺</div>
          <h1 style={{fontSize:26,fontWeight:800,color:C.green,letterSpacing:'-0.02em',marginBottom:8}}>
            나에게 딱 맞는<br />맥주는?
          </h1>
          <p style={{fontSize:14,color:C.muted,lineHeight:1.7,marginBottom:8}}>
            4가지 질문으로 알아보는<br />나의 맥주 성격 유형
          </p>
          <p style={{fontSize:12,color:C.copper,marginBottom:32}}>
            하이네켄 실버 / 0.0 / 비라모레띠 / 설화 중 추천!
          </p>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:24}}>
            {[
              ['⚡','결과는 5가지 맥주 유형 중 하나'],
              ['🤖','Claude AI가 나만을 위한 코멘트 작성'],
              ['⏱️','1분이면 충분해요'],
            ].map(function(item,i){
              return <div key={i} style={{display:'flex',alignItems:'center',gap:10,backgroundColor:C.surface,borderRadius:10,padding:'12px 16px',border:'1px solid '+C.line}}>
                <span style={{fontSize:20}}>{item[0]}</span>
                <span style={{fontSize:13,color:C.ink}}>{item[1]}</span>
              </div>;
            })}
          </div>
          <GBtn onClick={startQuiz}>테스트 시작하기</GBtn>
        </div>
      </div>
    );
  }

  /* ── 결과 ── */
  if (step === 99 && result) {
    var bt = BEER_TYPES[result];
    var bp = PRODUCTS.filter(function(p){return p.code===result;})[0];
    return (
      <div className="afd">
        <BackBtn onClick={function(){nav('home');}} label="홈으로" />
        <div style={{textAlign:'center',marginTop:16,marginBottom:20}}>
          <div style={{display:'inline-block',backgroundColor:bt.light,color:bt.color,borderRadius:999,padding:'4px 14px',fontSize:11,fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:10}}>
            나의 맥주 유형
          </div>
          <h1 style={{fontSize:28,fontWeight:800,color:bt.color,letterSpacing:'-0.02em',marginBottom:4}}>{bt.title}</h1>

        </div>

        <div style={{borderRadius:16,background:'linear-gradient(135deg,'+bt.color+' 0%,'+bt.color+'cc 100%)',padding:'28px 24px',marginBottom:16,textAlign:'center',position:'relative',overflow:'hidden'}}>
          {typeof PROD_IMGS !== 'undefined' && <img src={PROD_IMGS[result]} alt={bp.name} style={{height:160,width:'auto',objectFit:'contain',filter:'drop-shadow(0 12px 24px rgba(0,0,0,0.5))',marginBottom:16}} />}
          <div style={{fontSize:18,fontWeight:800,color:'#fff',marginBottom:4}}>{bp.name}</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,0.7)'}}>{bp.pack} · {fmt(bp.price)}원</div>
        </div>

        <div style={{borderRadius:12,backgroundColor:C.surface,border:'1px solid '+C.line,padding:20,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:C.copper,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:10}}>유형 설명</div>
          <p style={{fontSize:14,color:C.ink,lineHeight:1.7,margin:0}}>{bt.desc}</p>
        </div>

        <div style={{borderRadius:12,backgroundColor:bt.light,border:'1px solid '+bt.color+'44',padding:20,marginBottom:22}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <div style={{fontSize:16}}>🤖</div>
            <div style={{fontSize:11,fontWeight:700,color:bt.color,letterSpacing:'0.15em',textTransform:'uppercase'}}>Claude의 코멘트</div>
          </div>
          {loadingAI ? (
            <div style={{display:'flex',alignItems:'center',gap:8,color:C.muted,fontSize:13}}>
              <span style={{display:'inline-block',width:16,height:16,border:'2px solid '+bt.color,borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}></span>
              분석 중...
            </div>
          ) : aiComment ? (
            <p style={{fontSize:14,color:C.ink,lineHeight:1.7,margin:0}}>{aiComment}</p>
          ) : (
            <p style={{fontSize:13,color:C.muted,margin:0}}>코멘트를 불러오지 못했어요.</p>
          )}
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <GBtn onClick={function(){nav('home');}}>주문하러 가기</GBtn>
          <button onClick={startQuiz} style={{width:'100%',borderRadius:10,border:'1px solid '+C.line,backgroundColor:C.surface,padding:'12px 0',fontSize:13,fontWeight:600,color:C.ink,cursor:'pointer'}}>
            다시 테스트하기
          </button>
        </div>

        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  /* ── 질문 ── */
  var q = QUIZ_QS[step];
  var progress = step / QUIZ_QS.length;
  return (
    <div className="afd">
      <BackBtn onClick={function(){nav('home');}} label="그만하기" />
      <div style={{marginTop:16,marginBottom:24}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontSize:12,color:C.muted}}>{step+1} / {QUIZ_QS.length}</span>
          <span style={{fontSize:12,color:C.muted}}>
            {['⭕','⭕','⭕','⭕'].map(function(_,i){return i<step?'🟢':i===step?'🟡':'⚪';}).join(' ')}
          </span>
        </div>
        <div style={{height:4,backgroundColor:C.lineSoft,borderRadius:2}}>
          <div style={{height:4,backgroundColor:C.green,borderRadius:2,width:Math.round(progress*100)+'%',transition:'width .3s'}} />
        </div>
      </div>

      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontSize:40,marginBottom:12}}>🍺</div>
        <h2 style={{fontSize:20,fontWeight:800,color:C.ink,letterSpacing:'-0.01em',lineHeight:1.35,margin:0}}>{q.q}</h2>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:10,opacity:animating?0:1,transition:'opacity .2s'}}>
        {q.opts.map(function(opt,oi){
          return (
            <button key={oi} onClick={function(){pickAnswer(oi);}}
              style={{width:'100%',textAlign:'left',borderRadius:12,border:'2px solid '+C.line,backgroundColor:C.surface,padding:'16px 18px',cursor:'pointer',display:'flex',alignItems:'center',gap:14,transition:'all .15s'}}>
              <span style={{fontSize:26,flexShrink:0}}>{opt.emoji}</span>
              <span style={{fontSize:14,color:C.ink,fontWeight:500,lineHeight:1.4}}>{opt.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}
function Brand(){
  return <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:18}}>
    <div style={{width:30,height:4,borderRadius:2,backgroundColor:C.copper}} />
    <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.25em',textTransform:'uppercase',color:C.copper}}>Internal Sales · Heineken Korea</span>
  </div>;
}
function BackBtn(p){ return <button onClick={p.onClick} style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:13,fontWeight:500,color:C.muted,background:'none',border:'none',cursor:'pointer',padding:0}}>{'← '+p.label}</button>; }
function Chip(p){ var bg=p.copper?C.copperBg:C.green,fg=p.copper?C.copper:C.surface; return <span style={{display:'inline-block',fontSize:11,fontWeight:700,borderRadius:999,padding:'3px 9px',backgroundColor:bg,color:fg}}>{p.children}</span>; }
function Card(p){ return <section style={{marginBottom:20}}><div style={{display:'flex',alignItems:'baseline',gap:9,marginBottom:9}}><span style={{fontSize:10,fontFamily:'monospace',fontWeight:700,color:C.copper,letterSpacing:'0.1em'}}>{p.no}</span><h2 style={{fontSize:14,fontWeight:700,color:C.ink,margin:0}}>{p.title}</h2></div><div style={{borderRadius:12,border:'1px solid '+C.line,backgroundColor:C.surface,padding:18}}>{p.children}</div></section>; }
function Field(p){ return <div><div style={{display:'flex',alignItems:'center',gap:4,marginBottom:5}}><span style={{fontSize:12,fontWeight:700,color:C.ink}}>{p.label}</span>{p.required&&<span style={{fontSize:11,color:C.copper}}>*</span>}{p.hint&&<span style={{fontSize:11,color:C.muted,fontWeight:400}}>{'· '+p.hint}</span>}</div>{p.children}</div>; }
function Inp(p){
  var fs=useState(false); var f=fs[0]; var sf=fs[1];
  return <input type={p.type||'text'} value={p.value} onChange={function(e){p.onChange(e.target.value);}} maxLength={p.maxLength} inputMode={p.inputMode}
    style={{width:'100%',borderRadius:8,border:'1px solid '+(f?C.green:C.line),padding:'10px 12px',fontSize:13,backgroundColor:f?C.surface:C.inputBg,color:C.ink,outline:'none',fontFamily:FONT}}
    onFocus={function(){sf(true);}} onBlur={function(){sf(false);}} />;
}
function Sel(p){
  var fs=useState(false); var f=fs[0]; var sf=fs[1];
  return <select value={p.value} onChange={function(e){p.onChange(e.target.value);}}
    style={{width:'100%',appearance:'none',borderRadius:8,border:'1px solid '+(f?C.green:C.line),padding:'10px 30px 10px 12px',fontSize:13,backgroundColor:p.value?C.surface:C.inputBg,color:p.value?C.ink:C.muted,outline:'none',fontFamily:FONT,backgroundImage:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='7' viewBox='0 0 10 7'><path fill='none' stroke='%236F6A5E' stroke-width='1.5' d='M1 1l4 4 4-4'/></svg>\")",backgroundRepeat:'no-repeat',backgroundPosition:'right 10px center'}}
    onFocus={function(){sf(true);}} onBlur={function(){sf(false);}}>
    <option value="">{p.ph}</option>
    {p.options.map(function(o){ var v=typeof o==='string'?o:o.value,l=typeof o==='string'?o:o.label; return <option key={v} value={v}>{l}</option>; })}
  </select>;
}
function Stepper(p){
  var min=p.min||1,max=p.max||99,value=p.value,onChange=p.onChange;
  return <div style={{display:'flex',borderRadius:8,border:'1px solid '+C.line,backgroundColor:C.inputBg,overflow:'hidden'}}>
    <button type="button" onClick={function(){onChange(Math.max(min,(value||0)-1));}} style={{width:34,height:38,display:'flex',alignItems:'center',justifyContent:'center',background:'none',border:'none',cursor:'pointer',fontSize:15,color:C.muted}}>-</button>
    <input type="number" value={value} onChange={function(e){onChange(Math.max(min,Math.min(max,parseInt(e.target.value)||min)));}} style={{width:32,textAlign:'center',fontSize:13,background:'transparent',outline:'none',border:'none',borderLeft:'1px solid '+C.line,borderRight:'1px solid '+C.line,color:C.ink,height:38,fontFamily:FONT}} />
    <button type="button" onClick={function(){onChange(Math.min(max,(value||0)+1));}} style={{width:34,height:38,display:'flex',alignItems:'center',justifyContent:'center',background:'none',border:'none',cursor:'pointer',fontSize:15,color:C.muted}}>+</button>
  </div>;
}
function IBtn(p){
  var hs=useState(false); var h=hs[0]; var sh=hs[1];
  return <button type="button" onClick={p.onClick} style={{width:27,height:27,display:'inline-flex',alignItems:'center',justifyContent:'center',borderRadius:6,border:'none',cursor:'pointer',fontSize:13,color:p.danger?C.red:C.muted,backgroundColor:h?(p.danger?C.redBg:'#EBE3D0'):'transparent'}} onMouseEnter={function(){sh(true);}} onMouseLeave={function(){sh(false);}}>{p.children}</button>;
}
function GBtn(p){
  var hs=useState(false); var h=hs[0]; var sh=hs[1];
  return <button type="button" onClick={p.onClick} disabled={p.disabled} style={{display:'block',width:'100%',borderRadius:10,border:'none',padding:'14px 0',fontSize:14,fontWeight:700,cursor:p.disabled?'not-allowed':'pointer',backgroundColor:p.disabled?C.line:(h?C.greenD:C.green),color:p.disabled?C.muted:C.surface,letterSpacing:'0.03em'}} onMouseEnter={function(){sh(true);}} onMouseLeave={function(){sh(false);}}>{p.children}</button>;
}
function GCard(p){
  var hs=useState(false); var h=hs[0]; var sh=hs[1];
  return <button onClick={p.onClick} style={{textAlign:'left',borderRadius:12,border:'2px solid '+C.green,backgroundColor:h?C.greenD:C.green,color:C.surface,padding:18,cursor:'pointer'}} onMouseEnter={function(){sh(true);}} onMouseLeave={function(){sh(false);}}>{p.children}</button>;
}
function DashBtn(p){ return <button onClick={p.onClick} style={{marginTop:10,width:'100%',borderRadius:8,border:'2px dashed '+C.line,backgroundColor:'transparent',padding:'10px 0',fontSize:13,fontWeight:700,color:C.green,cursor:'pointer'}}>{p.children}</button>; }
function SRow(p){ return <div style={{display:'flex',justifyContent:'space-between',padding:'3px 0'}}><span style={{fontSize:13,color:C.copperL,opacity:.85}}>{p.label}</span><span style={{fontSize:14,fontWeight:600}}>{p.val}</span></div>; }
function BankRow(p){ return <div style={{display:'flex',gap:10}}><span style={{fontSize:11,fontWeight:700,width:42,flexShrink:0,color:C.green,paddingTop:2}}>{p.label}</span><div><div style={{fontSize:13,fontFamily:'monospace',color:C.ink}}>{p.acc}</div><div style={{fontSize:11,color:C.muted}}>예금주: {p.holder}</div></div></div>; }
function ErrBox(p){ return <div style={{borderRadius:8,backgroundColor:C.redBg,border:'1px solid '+C.red,padding:'10px 13px',fontSize:12,color:C.red,marginBottom:12}}>{p.children}</div>; }
function Empty(p){ return <div style={{borderRadius:10,border:'1px dashed '+C.line,padding:28,textAlign:'center',fontSize:13,color:C.muted,lineHeight:1.7}}>{p.children}</div>; }
function Toast(p){ return <div style={{position:'fixed',top:20,left:'50%',transform:'translateX(-50%)',backgroundColor:C.green,color:C.surface,borderRadius:8,padding:'10px 20px',fontSize:13,fontWeight:600,zIndex:999,boxShadow:'0 4px 12px rgba(0,0,0,.2)'}}>{p.children}</div>; }
function Spinner(){ return <div style={{paddingTop:80,textAlign:'center',fontSize:13,color:C.muted}}>불러오는 중...</div>; }
function CDlg(p){
  return <div style={{position:'fixed',inset:0,backgroundColor:'rgba(0,0,0,.4)',zIndex:998,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div style={{backgroundColor:C.surface,borderRadius:14,padding:24,maxWidth:320,width:'100%'}}>
      <p style={{fontSize:14,color:C.ink,marginBottom:20,lineHeight:1.5}}>{p.msg}</p>
      <div style={{display:'flex',gap:10}}>
        <button onClick={p.onCancel} style={{flex:1,borderRadius:8,border:'1px solid '+C.line,backgroundColor:C.surface,padding:'10px 0',fontSize:13,cursor:'pointer',color:C.muted}}>취소</button>
        <button onClick={p.onOk} style={{flex:1,borderRadius:8,border:'none',backgroundColor:C.red,color:C.surface,padding:'10px 0',fontSize:13,fontWeight:700,cursor:'pointer'}}>확인</button>
      </div>
    </div>
  </div>;
}
function NFView(p){ return <div style={{paddingTop:60,textAlign:'center'}} className="afd">
  <div style={{fontSize:40,marginBottom:10}}>🍺</div>
  <h1 style={{fontSize:20,fontWeight:700,marginBottom:8}}>그룹을 찾을 수 없어요</h1>
  <p style={{fontSize:13,color:C.muted,marginBottom:22}}>코드가 잘못됐거나 삭제된 그룹일 수 있어요.</p>
  <button onClick={function(){p.nav('home');}} style={{borderRadius:8,backgroundColor:C.green,color:C.surface,border:'none',padding:'10px 20px',fontSize:13,fontWeight:700,cursor:'pointer'}}>홈으로</button>
</div>; }


document.getElementById('loading').style.display = 'none';
document.getElementById('root').style.display = 'block';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App, null));
</script>
</body>
